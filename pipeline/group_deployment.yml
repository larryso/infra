parameters:     
  - name: action
    type: string
  - name: tfPool
    type: string
  - name: stageName
    type: string
  - name: dependsOn
    type: object
    default: {}
  - name: adoEnvironment
    type: string
  - name: pluginCacheDir
    type: string
  - name: terraformVersion
    type: string
    default: 1.14.4
  - name: parallelism
    type: number
    default: 1 

    
stages: 
  - stage: '${{ parameters.stageName }}'
    ${{ if eq(parameters.action, 'create') }}:
        displayName: '${{ parameters.stageName }} - Plan Create'
    ${{ if eq(parameters.action, 'destroy') }}:
        displayName: '${{ parameters.stageName }} - Plan Destroy'
    ${{ if eq(parameters.action, 'rotate') }}:
        displayName: '${{ parameters.stageName }} - Plan Rotate'
    ${{ if eq(parameters.action, 'none') }}:
        displayName: '${{ parameters.stageName }} - Plan None'
    dependsOn:
      - 'init'
      - ${{ each dep in parameters.dependsOn }}:
        - ${{ dep }}
    jobs:
      - deployment: '${{ parameters.stageName }}'
        ${{ if eq(parameters.action, 'create') }}:
          displayName: '${{ parameters.stageName }} - Plan Create'
        ${{ if eq(parameters.action, 'destroy') }}:
          displayName: '${{ parameters.stageName }} - Plan Destroy'
        ${{ if eq(parameters.action, 'rotate') }}:
          displayName: '${{ parameters.stageName }} - Plan Rotate'
        ${{ if eq(parameters.action, 'none') }}:
          displayName: '${{ parameters.stageName }} - Plan None'
        environment: '${{ parameters.adoEnvironment }}'
        pool:
          name: ${{ parameters.tfPool }}
        condition: succeeded()
        workspace:
          clean: all
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  # Load secrets
                  ## TODO
                - task: DownloadPipelineArtifact@2
                  displayName: Pull terraform artifact
                  inputs:
                    source: current
                    path: $(Agent.ToolsDirectory)/terraform/
                    artifact: terraform

                - task: DownloadPipelineArtifact@2
                  displayName: Pull terraform plugin cache artifact
                  inputs:
                    source: current
                    path: ${{ parameters.pluginCacheDir }}
                    artifact: terraform_plugins

                # Output build info
                - task: Bash@3
                  displayName: Release information
                  inputs:
                    targetType: 'inline'
                    failOnStderr: true
                    workingDirectory: $(Agent.BuildDirectory)
                    script: |
                      echo "envClass: @@@@@@@@@@"
                # Install terraform version for a component (should be taken from tools cache)
                - task: TerraformInstaller@0
                  displayName: Installing Terraform ${{ parameters.terraformVersion }}
                  inputs:
                    terraformVersion: ${{ parameters.terraformVersion }}

                  # Set terraform providers permissions
                - task: Bash@3
                  displayName: Set terraform providers permissions
                  inputs:
                    targetType: 'inline'
                    failOnStderr: true
                    workingDirectory: $(Agent.BuildDirectory)
                    script: |
                      chmod -R 755 ${pluginCacheDir}/
                  env:
                    pluginCacheDir: ${{ parameters.pluginCacheDir }}

                # Run terraform init
                - task: Bash@3
                  displayName: Run Terraform Init 
                  inputs:
                    targetType: 'inline'
                    failOnStderr: true
                    workingDirectory: $(Build.SourcesDirectory)/0-infra-core
                    script: |
                     pwd
                     ls
                     terraform init \
                     -reconfigure \
                     -input=false \
                     -backend=${TF_BACKEND_ENABLED} \
                  env:
                    TF_BACKEND_ENABLED: false

                #Run Terraform plan
                - task: TerraformCLI@0
                  displayName: Terraform Plan
                  env:
                    # ALICLOUD_ACCESS_KEY: $(setSecrets.ALICLOUD_ACCESS_KEY)
                    # ALICLOUD_SECRET_KEY: $(setSecrets.ALICLOUD_SECRET_KEY)  
                    # ALICLOUD_REGION: $(ali.region)
                    # ALICLOUD_OSS_ENDPOINT: $(ali.terraformState.endpoint)
                    # TF_LOG: ${{ parameters.debug }}
                    TF_IN_AUTOMATION: true
                    # TF_VAR_build_number: $(Build.BuildNumber)
                  inputs:
                    command: plan
                    publishPlanResults: '${{ parameters.stageName }} ${{ parameters.adoEnvironment }} ($(System.StageAttempt))' # public plan result as artifact
                    workingDirectory: $(Build.SourcesDirectory)/0-infra-core
                    ${{ if eq(parameters.action, 'create') }}:
                      commandOptions: "-input=false -parallelism=${{ parameters.parallelism }} -out ${{ parameters.stageName }}.tfplan"
                    ${{ if eq(parameters.action, 'destroy') }}:
                      commandOptions: "-destroy -input=false -parallelism=${{ parameters.parallelism }} -out ${{ parameters.stageName }}.tfplan"
                    ${{ if eq(parameters.action, 'rotate') }}:
                      commandOptions: "-input=false -parallelism=${{ parameters.parallelism }} -out ${{ parameters.stageName }}.tfplan"
                    ${{ if eq(parameters.action, 'none') }}:
                      commandOptions: "-input=false -out ${{ parameters.stageName }}.tfplan"

                # Prepare terraform plan artifact
                - task: Bash@3
                  displayName: Prepare plan artifact
                  inputs:
                    targetType: 'inline'
                    failOnStderr: true
                    workingDirectory: $(Build.SourcesDirectory)/0-infra-core
                    script: |
                      tmp_dir=$(mktemp -d $(Build.SourcesDirectory)/0-infra-core/${{ parameters.stageName }})
                      echo "Tempdir: ${tmp_dir}"

                      echo "Adding ${{ parameters.stageName }}.tfplan"
                      cp ${{ parameters.stageName }}.tfplan $tmp_dir

                ## publish terraform plan artifact - in real prod save artifact to cloud 
                - publish: $(mktemp -d $(Build.SourcesDirectory)/0-infra-core/${{ parameters.stageName }})
                  artifact: terraform-plan-${{ parameters.stageName }}
                  displayName: Publish Terraform artifact of terraform plan

  # -----=== APPLY STAGE ===-----
  - stage: 'apply_${{ parameters.stageName }}'
    ${{ if eq(parameters.action, 'create') }}:
      displayName: '${{ parameters.stageName }} - Apply Create'
    ${{ if eq(parameters.action, 'destroy') }}:
      displayName: '${{ parameters.stageName }} - Apply Destroy'
    ${{ if eq(parameters.action, 'rotate') }}:
      displayName: '${{ parameters.stageName }} - Apply Rotate'
    ${{ if eq(parameters.action, 'none') }}:
      displayName: '${{ parameters.stageName }} - Apply None'
    environment: ${{ parameters.adoEnvironment }}
    dependsOn: 
      - ${{ parameters.stageName }}    
    jobs:
      - deployment: 'apply_${{ parameters.stageName }}'  
        pool: 
          name: 
        condition: succeeded()
        workspace:
          clean: all
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  # Load secrets
                  ## TODO
                - task: DownloadPipelineArtifact@2
                  displayName: Pull terraform artifact
                  inputs:
                    source: current
                    path: $(Agent.ToolsDirectory)/terraform/
