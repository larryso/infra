                # Run terraform init
                - task: Bash@3
                  displayName: Run Terraform Init 
                  inputs:
                    targetType: 'inline'
                    failOnStderr: true
                    workingDirectory: $(Build.SourcesDirectory)/0-infra-core
                    script: |
                     pwd
                     ls
                     terraform init \
                     -reconfigure \
                     -input=false \
                     -backend=${TF_BACKEND_ENABLED} \
                  env:
                    TF_BACKEND_ENABLED: false

                # Download terraform plan
                - template: steps/download_artifact.yml
                    parameters:
                      artifactName: plan_tf_${{ parameters.stageName }}_${{ component.name }}_$(attemptNo)
                      downloadPath: $(Build.SourcesDirectory)/plan_tf_${{ component.terraformCodeFolder }}

                - ${{ if eq(parameters.action, 'create') }}:
                  - task: Bash@3
                    displayName: Terraform Apply create
                    inputs:
                      targetType: 'inline'
                      failOnStderr: true
                      workingDirectory: $(Build.SourcesDirectory)/0-infra-core
                      script: |
                        echo "Starting terraform apply with parallelism=${{ parameters.parallelism }}"

                        #terraform apply -input=false -parallelism=${{ parameters.parallelism }} $(Build.SourcesDirectory)/plan_tf_${{ component.terraformCodeFolder }}/${{ component.name }}.tfplan
                    env:
                      # ALICLOUD_ACCESS_KEY: $(setSecrets.ALICLOUD_ACCESS_KEY)
                      # ALICLOUD_SECRET_KEY: $(setSecrets.ALICLOUD_SECRET_KEY)
                      # ALICLOUD_REGION: $(ali.region)
                      TF_IN_AUTOMATION: true

                - ${{ if eq(parameters.action, 'destroy') }}:
                  - task: Bash@3
                    displayName: Terraform Apply destroy
                    inputs:
                      targetType: 'inline'
                      failOnStderr: true
                      workingDirectory: $(Build.SourcesDirectory)/0-infra-core
                      script: |
                        echo "good!"
                        # terraform apply -destroy -input=false -parallelism=${{ parameters.parallelism }} ${{ parameters.planFileName }}
                    env:
                      # ALICLOUD_ACCESS_KEY: $(setSecrets.ALICLOUD_ACCESS_KEY)
                      # ALICLOUD_SECRET_KEY: $(setSecrets.ALICLOUD_SECRET_KEY)
                      # ALICLOUD_REGION: $(ali.region)
                      TF_IN_AUTOMATION: true

