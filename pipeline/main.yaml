# Simple Azure DevOps Pipeline with Stages
trigger:
- master  # Pipeline runs when changes are pushed to main branch

# Define variables that can be used throughout the pipeline
variables:
  vmImage: 'ubuntu-latest'
  projectName: 'MyWebApp'

# Define the stages of your pipeline
stages:
# Stage 1: Initialization
- stage: init
  displayName: 'Terraform init'
  jobs:
  - job: initTerraform
    displayName: 'Init Terraform providers cache'
    pool:
      vmImage: $(vmImage)
    steps:
    - task: Bash@3
      displayName: Terraform configure
      inputs:
        targetType: 'inline'
        failOnStderr: true
        script: |
          export TF_CLI_CONFIG_FILE="~/.terraformrc"
          export TF_REGISTRY_DISCOVERY_RETRY=100
          export TF_REGISTRY_CLIENT_TIMEOUT=100
          # export TF_LOG="DEBUG"
          echo "Creating ~/.terraformrc"
        cat > ~/.terraformrc << EOF
        disable_checkpoint = ${INTERNET_DISABLED,,}
        EOF

        if [ ${INTERNET_DISABLED,,} == "false" ] ; then
          echo "Attaching plugin cache directory to the ~/.terraformrc"
          cat >> ~/.terraformrc <<EOF
          plugin_cache_dir = "${TF_PLUGIN_CACHE_DIR}"
        EOF
        fi

        if [ ${INTERNET_DISABLED,,} == "true" ] ; then
          echo "Attaching provider_installation to the ~/.terraformrc"
          cat >> ~/.terraformrc <<EOF
          provider_installation {
            filesystem_mirror {
              path    = "${TF_PLUGIN_CACHE_DIR}"
              include = ["registry.terraform.io/*/*"]
            }
          }
        EOF
        fi

        echo "-----=== ~/.terraformrc ===-----"
        cat ~/.terraformrc
        echo "-----=== ^^^ ===-----"

        echo "Creating plugins dir at: ${TF_PLUGIN_CACHE_DIR}"
        mkdir -p ${TF_PLUGIN_CACHE_DIR}
    env:
      TF_PLUGIN_CACHE_DIR: ${{ parameters.pluginCacheDir }}
      INTERNET_DISABLED: ${{ parameters.disableInternet }}

          
    
  

# Stage 2: Test
- stage: Test
  displayName: 'Test Stage'
  dependsOn: Build  # This stage runs after Build stage
  condition: succeeded()  # Only run if Build succeeded
  jobs:
  - job: TestJob
    displayName: 'Run Tests'
    pool:
      vmImage: $(vmImage)
    steps:
    - download: current
      artifact: drop
      displayName: 'Download artifacts'
    
    - script: |
        echo "Testing $(projectName)..."
        cat $(Pipeline.Workspace)/drop/build-info.txt
        echo "Running unit tests..."
        echo "All tests passed!"
      displayName: 'Execute Tests'

# Stage 3: Deploy to Development
- stage: DevDeploy
  displayName: 'Deploy to Development'
  dependsOn: Test  # This stage runs after Test stage
  condition: succeeded()  # Only run if Test succeeded
  jobs:
  - job: DevDeployJob
    displayName: 'Deploy to Dev Environment'
    pool:
      vmImage: $(vmImage)
    steps:
    - download: current
      artifact: drop
      displayName: 'Download artifacts'
    
    - script: |
        echo "Deploying $(projectName) to Development environment..."
        echo "Build ID: $(Build.BuildId)"
        echo "Deployment to Dev completed successfully!"
        echo "Application URL: https://dev.$(projectName).com"
      displayName: 'Deploy to Dev'

# Stage 4: Deploy to Production (with approval)
- stage: ProdDeploy
  displayName: 'Deploy to Production'
  dependsOn: DevDeploy  # This stage runs after DevDeploy stage
  condition: succeeded()  # Only run if DevDeploy succeeded
  jobs:
  - deployment: ProdDeployJob
    displayName: 'Deploy to Production'
    pool:
      vmImage: $(vmImage)
    environment: 'production'  # Creates/uses an environment named 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: 'Download artifacts'
          
          - script: |
              echo "Deploying $(projectName) to Production environment..."
              echo "Build ID: $(Build.BuildId)"
              echo "Performing production deployment..."
              echo "Deployment to Production completed successfully!"
              echo "Production URL: https://www.$(projectName).com"
            displayName: 'Deploy to Production'
          
          - script: |
              echo "Running smoke tests on production..."
              echo "All smoke tests passed!"
            displayName: 'Smoke Tests'
