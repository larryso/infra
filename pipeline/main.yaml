# Simple Azure DevOps Pipeline with Stages
trigger:
- master  # Pipeline runs when changes are pushed to main branch

parameters:
  - name: pluginCacheDir
    type: string
    default: '$(Pipeline.Workspace)/.terraform.d/plugins'
  - name: disableInternet
    type: boolean
    default: false
  - name: terraformVersion
    type: string
    default: 1.14.4
  - name: backend
    type: object
    default:
      enabled: false
      key: ''
  - name: action
    type: string
    default: "create"
  - name: tfPool
    type: string
    default: "Azure Pipelines"

# Define variables that can be used throughout the pipeline
variables:
  vmImage: 'ubuntu-latest'
  projectName: 'Infra Release'

# Define the stages of your pipeline
stages:
# Stage 1: Initialization
- stage: init
  displayName: 'Terraform init'
  jobs:
  - job: initTerraform
    displayName: 'Init Terraform providers cache'
    pool:
      vmImage: $(vmImage)
    steps:
    - task: Bash@3
      displayName: Terraform configure
      inputs:
        targetType: 'inline'
        failOnStderr: true
        script: |
          export TF_CLI_CONFIG_FILE="~/.terraformrc"
          export TF_REGISTRY_DISCOVERY_RETRY=100
          export TF_REGISTRY_CLIENT_TIMEOUT=100
          # export TF_LOG="DEBUG"
          echo "Creating ~/.terraformrc"
          cat > ~/.terraformrc << EOF
          disable_checkpoint =  ${INTERNET_DISABLED,,}
          EOF

          if [  ${INTERNET_DISABLED,,} == "false" ] ; then
            echo "Attaching plugin cache directory to the ~/.terraformrc"
            cat >> ~/.terraformrc <<EOF
            plugin_cache_dir = "${TF_PLUGIN_CACHE_DIR}"
          EOF
          fi

          if [  ${INTERNET_DISABLED,,} == "true" ] ; then
            echo "Attaching provider_installation to the ~/.terraformrc"
            cat >> ~/.terraformrc <<EOF
            provider_installation {
              filesystem_mirror {
                path    = "${TF_PLUGIN_CACHE_DIR}"
                include = ["registry.terraform.io/*/*"]
              }
            }
          EOF
          fi

          echo "-----=== ~/.terraformrc ===-----"
          cat ~/.terraformrc
          echo "-----=== ^^^ ===-----"

          echo "Creating plugins dir at: ${TF_PLUGIN_CACHE_DIR}"
          mkdir -p ${TF_PLUGIN_CACHE_DIR}
      env:
        TF_PLUGIN_CACHE_DIR: ${{ parameters.pluginCacheDir }}
        INTERNET_DISABLED: ${{ parameters.disableInternet }}
    # Install terraform version
    - task: TerraformInstaller@0
      displayName: Installing Terraform ${{ parameters.terraformVersion }} (1)
      inputs:
        terraformVersion: ${{ parameters.terraformVersion }}
    # Terraform init
    - task: Bash@3
      displayName: Run Terraform Init 
      inputs:
        targetType: 'inline'
        failOnStderr: true
        workingDirectory: $(Build.SourcesDirectory)/0-infra-core
        script: |
          echo "ALICLOUD_REGION: ${ALICLOUD_REGION}"
          echo "OSS_ENDPOINT: ${TF_BACKEND_ALI_OSS_ENDPOINT}"
          echo "TF_BACKEND_ALI_PREFIX: ${TF_BACKEND_ALI_PREFIX}"
          echo "TF_BACKEND_ALI_KEY: ${TF_BACKEND_ALI_KEY}"

          echo "Starting terraform init"
          terraform init \
            -reconfigure \
            -input=false \
            -backend=${TF_BACKEND_ENABLED} \
            # -backend-config="bucket=${TF_BACKEND_ALI_BUCKET}" \
            # -backend-config="prefix=${TF_BACKEND_ALI_PREFIX}" \
            # -backend-config="endpoint=${TF_BACKEND_ALI_OSS_ENDPOINT}" \
            # -backend-config="key=${TF_BACKEND_ALI_KEY}"
      env:
        TF_BACKEND_ENABLED: ${{ parameters.backend.enabled }}
        # TF_BACKEND_ALI_BUCKET: $(ali.terraformState.bucket)
        # TF_BACKEND_ALI_PREFIX: $(ali.terraformState.prefix)
        # TF_BACKEND_ALI_OSS_ENDPOINT: $(ali.terraformState.endpoint)
        # TF_BACKEND_ALI_KEY: ${{ parameters.backend.key }}
        # ALICLOUD_ACCESS_KEY: $(setSecrets.ALICLOUD_ACCESS_KEY)
        # ALICLOUD_SECRET_KEY: $(setSecrets.ALICLOUD_SECRET_KEY)
        # ALICLOUD_REGION: $(ali.region)
        # TF_VAR_build_number: $(Build.BuildNumber)
        # TF_IN_AUTOMATION: true
        
    # Publish terraform binaries as a pipeline artifact
    - publish: $(Agent.ToolsDirectory)/terraform/
      artifact: terraform
      displayName: Publish Terraform artifact

    # Publish terraform plugin cache as a pipeline artifact
    - publish: ${{ parameters.pluginCacheDir }}
      artifact: terraform_plugins
      displayName: Publish Terraform plugin cache artifact

# Release Dev        
- template: group_deployment.yml
  parameters:
    tfPool: ${{ parameters.tfPool }}
    # envClass: "prod"
    # envGroup: "prod"
    # envType: "controlled"
    action: ${{ parameters.action }}
    stageName: "release_dev"
    adoEnvironment: "Dev"
    pluginCacheDir: ${{ parameters.pluginCacheDir }}

# Release UAT        
- template: group_deployment.yml
  parameters:
    tfPool: ${{ parameters.tfPool }}
    # envClass: "prod"
    # envGroup: "prod"
    # envType: "controlled"
    action: ${{ parameters.action }}
    stageName: "release_uat"
    adoEnvironment: "Dev"
    pluginCacheDir: ${{ parameters.pluginCacheDir }}
    
# Release PROD        
- template: group_deployment.yml
  parameters:
    tfPool: ${{ parameters.tfPool }}
    # envClass: "prod"
    # envGroup: "prod"
    # envType: "controlled"
    action: ${{ parameters.action }}
    stageName: "release_prod"
    adoEnvironment: "Dev"
    pluginCacheDir: ${{ parameters.pluginCacheDir }}
    
